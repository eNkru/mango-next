

services:
  mango:
    # Build from source so your local changes are included.
    # Copy the entire project directory to the NAS, then point build.context to it.
    build:
      context: /share/Container/mango-src
      dockerfile: Dockerfile
    image: mango_cn:local
    container_name: mango
    restart: unless-stopped
    ports:
      - "9000:9000"
    volumes:
      - /share/Multimedia/Manga:/root/mango/library
      - /share/Container/mango/data:/root/mango
      - /share/Container/mango/config:/root/.config/mango
    environment:
      - PORT=9000
      - DB_PATH=/root/mango/mango.db
      # Optional: override via env (see go/internal/config/config.go)
      # - LIBRARY_PATH=/root/mango/library
      # - SCAN_INTERVAL_MINUTES=10
      # - DISABLE_LOGIN=false
